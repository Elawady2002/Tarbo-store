<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout – Tarbo Store</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #111111;
      --white: #ffffff;
      --gray-50: #f9f9f9;
      --gray-100: #f2f2f2;
      --gray-200: #e5e5e5;
      --gray-400: #999999;
      --gray-600: #555555;
      --red: #d92b2b;
      --font: 'Inter', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      line-height: 1.5;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 40px 24px;
    }

    .header-minimal {
      text-align: center;
      margin-bottom: 40px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--gray-200);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--black);
    }

    .checkout-layout {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 60px;
    }

    @media (max-width: 850px) {
      .checkout-layout {
        grid-template-columns: 1fr;
      }
      .order-summary {
        order: -1;
        position: static;
        margin-bottom: 24px;
      }
    }

    h2 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-section {
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--gray-600);
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .form-group input, .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--gray-200);
      border-radius: 4px;
      font-family: inherit;
      font-size: 14px;
      transition: border-color .2s;
    }

    .form-group input:focus {
      outline: none;
      border-color: var(--black);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .payment-options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .payment-option {
      border: 1px solid var(--gray-200);
      padding: 16px;
      border-radius: 4px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background .2s;
    }

    .payment-option:hover {
      background: var(--gray-50);
    }

    .payment-option input {
      accent-color: var(--black);
    }

    .order-summary {
      background: var(--gray-50);
      padding: 32px;
      border-radius: 8px;
      align-self: start;
    }

    .cart-items {
      margin-bottom: 24px;
    }

    .cart-item {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-200);
      font-size: 14px;
    }

    .summary-totals {
      margin-top: 24px;
    }

    .total-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .total-row.grand-total {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid var(--gray-200);
      font-weight: 700;
      font-size: 18px;
    }

    .btn-submit {
      width: 100%;
      background: var(--black);
      color: var(--white);
      border: none;
      padding: 18px;
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      cursor: pointer;
      margin-top: 32px;
      transition: background .2s;
    }

    .btn-submit:hover {
      background: #333;
    }

    /* Success Modal */
    #successOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 20px;
    }

    .success-modal {
      background: var(--white);
      padding: 60px 40px;
      max-width: 500px;
      width: 100%;
      text-align: center;
      border-radius: 8px;
    }

    .success-modal svg {
      width: 64px;
      height: 64px;
      color: #2d7a2d;
      margin-bottom: 24px;
    }

    .success-modal h3 {
      font-size: 24px;
      margin-bottom: 12px;
    }

    .success-modal p {
      color: var(--gray-600);
      margin-bottom: 32px;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header-minimal">
    <a href="index.html" class="logo">TARBO STORE</a>
  </div>

  <form id="checkoutForm" onsubmit="handleOrderComplete(event)">
    <div class="checkout-layout">
      <!-- Left: Details -->
      <div class="checkout-details">
        <div class="form-section">
          <h2>Contact Information</h2>
          <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="email" placeholder="email@example.com" required />
          </div>
        </div>

        <div class="form-section">
          <h2>Shipping Address</h2>
          <div class="grid-2">
            <div class="form-group">
              <label>First Name</label>
              <input type="text" id="firstName" placeholder="John" required />
            </div>
            <div class="form-group">
              <label>Last Name</label>
              <input type="text" id="lastName" placeholder="Doe" required />
            </div>
          </div>
          <div class="form-group">
            <label>Street Address</label>
            <input type="text" id="address" placeholder="123 Street Name" required />
          </div>
          <div class="grid-2">
            <div class="form-group">
              <label>City</label>
              <input type="text" id="city" placeholder="Cairo" required />
            </div>
            <div class="form-group">
              <label>Phone Number</label>
              <input type="tel" id="phone" placeholder="+20 123 456 7890" required />
            </div>
          </div>
        </div>

        <div class="form-section">
          <h2>Payment Method</h2>
          <div class="payment-options">
            <label class="payment-option">
              <input type="radio" name="payment" value="cod" checked />
              <span>Cash on Delivery</span>
            </label>
            <label class="payment-option">
              <input type="radio" name="payment" value="card" />
              <span>Credit / Debit Card</span>
            </label>
          </div>
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Complete Order</button>
      </div>

      <!-- Right: Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="checkoutItems" class="cart-items">
          <!-- Items will be injected here -->
        </div>
        
        <div class="summary-totals">
          <div class="total-row">
            <span>Subtotal</span>
            <span id="subtotalDisplay">LE 0.00</span>
          </div>
          <div class="total-row">
            <span>Shipping</span>
            <span>LE 50.00</span>
          </div>
          <div class="total-row grand-total">
            <span>Total</span>
            <span id="totalDisplay">LE 0.00</span>
          </div>
        </div>
      </div>
    </div>
  </form>
</div>

<div id="successOverlay">
  <div class="success-modal">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"></path>
    </svg>
    <h3>Order Placed!</h3>
    <p>Thank you for shopping with Tarbo Store. Your order has been received and is being processed.</p>
    <button class="btn-submit" style="margin-top:0;" onclick="window.location.href='index.html'">Return to Home</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const supabaseUrl = 'https://erbidxbhooavcynttbml.supabase.co';
  const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyYmlkeGJob29hdmN5bnR0Ym1sIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcxODk5MTgsImV4cCI6MjA5Mjc2NTkxOH0.HyksCx9ZVhZNdXfgNLiH3V9HnZUDh8I3KFbM_ovUn8o';
  const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

  function loadCheckout() {
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const total = parseFloat(localStorage.getItem('cartTotal') || '0');
    
    if (cart.length === 0) {
      document.querySelector('.checkout-layout').innerHTML = '<div style="text-align:center; grid-column: 1/-1; padding: 100px 0;"><h2>Your cart is empty</h2><br/><a href="index.html" class="btn-submit" style="max-width:300px; display:inline-block; text-decoration:none;">Go back to store</a></div>';
      return;
    }

    const itemsContainer = document.getElementById('checkoutItems');
    itemsContainer.innerHTML = '';

    cart.forEach(item => {
      const div = document.createElement('div');
      div.className = 'cart-item';
      div.innerHTML = `<span>${item.name}</span><span>LE ${item.price.toLocaleString()}.00</span>`;
      itemsContainer.appendChild(div);
    });

    document.getElementById('subtotalDisplay').textContent = `LE ${total.toLocaleString()}.00`;
    document.getElementById('totalDisplay').textContent = `LE ${(total + 50).toLocaleString()}.00`;
  }

  async function handleOrderComplete(e) {
    e.preventDefault();
    
    const submitBtn = document.getElementById('submitBtn');
    const originalText = submitBtn.textContent;
    submitBtn.textContent = 'Processing...';
    submitBtn.disabled = true;

    const email = document.getElementById('email').value;
    const firstName = document.getElementById('firstName').value;
    const lastName = document.getElementById('lastName').value;
    const address = document.getElementById('address').value;
    const city = document.getElementById('city').value;
    const phone = document.getElementById('phone').value;
    const payment = document.querySelector('input[name="payment"]:checked').value;
    
    const cart = JSON.parse(localStorage.getItem('cart') || '[]');
    const total = parseFloat(localStorage.getItem('cartTotal') || '0') + 50;

    try {
      const { data, error } = await supabaseClient
        .from('orders')
        .insert([
          { 
            customer_name: `${firstName} ${lastName}`,
            email: email,
            phone: phone,
            address: `${address}, ${city}`,
            payment_method: payment,
            items: cart,
            total_price: total
          }
        ]);
        
      if (error) throw error;
    } catch (err) {
      console.error('Error inserting order to Supabase:', err);
      // Proceed to show success anyway so user experience isn't blocked 
      // if DB table isn't created yet by the admin.
    }

    document.getElementById('successOverlay').style.display = 'flex';
    localStorage.removeItem('cart');
    localStorage.removeItem('cartTotal');
    
    submitBtn.textContent = originalText;
    submitBtn.disabled = false;
  }

  document.addEventListener('DOMContentLoaded', loadCheckout);
</script>

</body>
</html>
